; --- 策略组定义 ---

; 1. 区域手动选择组（Select模式，作为底层支撑）
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|hk|Hong Kong)
custom_proxy_group=🇯🇵 日本节点`select`(日本|JP|Japan|东京|大阪)
custom_proxy_group=🇺🇲 美国节点`select`(美|US|United States)
custom_proxy_group=🇸🇬 狮城节点`select`(新加坡|坡|SG|Singapore)
custom_proxy_group=🇨🇳 台湾节点`select`(台|TW|Taiwan)
custom_proxy_group=🇰🇷 韩国节点`select`(KR|Korea|首尔)

; 2. 主节点手动开关
custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]DIRECT

; 3. 功能分组（全部采用 url-test 故障转移，包含“🚀 节点选择”和“带1节点”）
; 注意：.*1.* 正则会自动抓取名称中带数字 1 的节点进行测速
custom_proxy_group=📲 电报消息`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=💬 OpenAi`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎥 视频解锁`url-test`[]🚀 节点选择`(NF|奈飞|Netflix|解锁).*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌍 国外媒体`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌏 国内媒体`url-test`[]DIRECT`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎮 游戏平台`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📢 谷歌FCM`url-test`[]DIRECT`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Ⓜ️ 微软服务`url-test`[]DIRECT`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=Ⓜ️ 微软云盘`url-test`[]DIRECT`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=💾 全赞助站`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌈 自定义HK`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🌈 自定义JP`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50

; 4. 关键修复：补全规则中引用的所有固定组名
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🚾 新浪微博`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=📺 巴哈姆特`url-test`[]🇨🇳 台湾节点`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🐟 漏网之鱼`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300,,50

