; --- 分组标志位开始 ---

; 1. 基础区域分组（这些分组保持 Select，用于手动选择具体地区的节点）
custom_proxy_group=🇭🇰 香港节点`select`(港|HK|hk|Hong Kong|HongKong|hongkong)
custom_proxy_group=🇯🇵 日本节点`select`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)
custom_proxy_group=🇺🇲 美国节点`select`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)
custom_proxy_group=🇸🇬 狮城节点`select`(新加坡|坡|狮城|SG|Singapore)
custom_proxy_group=🇨🇳 台湾节点`select`(台|新北|彰化|TW|Taiwan)
custom_proxy_group=🇰🇷 韩国节点`select`(KR|Korea|KOR|首尔|韩|韓)
custom_proxy_group=OT 其他节点`select`(.*)

; 2. 核心“1”节点自动测速组（url-test 会自动选择延迟最低的带“1”的节点）
custom_proxy_group=⚡ 自动选1`url-test`.*1.*`http://www.gstatic.com/generate_204`300,,50

; 3. 主节点选择（作为所有分组的默认手动开关）
custom_proxy_group=🚀 节点选择`select`[]⚡ 自动选1`[]🇭🇰 香港节点`[]🇸🇬 狮城节点`[]🇯🇵 日本节点`[]🇺🇲 美国节点`[]🇨🇳 台湾节点`[]DIRECT

; 4. 功能分组（全部改为 url-test，且包含“🚀 节点选择”和带“1”的节点筛选）
; 格式：分组名`url-test`节点筛选正则`测试URL`间隔
custom_proxy_group=📲 电报消息`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=💬 OpenAi`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=🎥 视频解锁`url-test`[]🚀 节点选择`(NF|奈飞|Netflix|解锁|Media).*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=🌍 国外媒体`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=🎮 游戏平台`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=Ⓜ️ 微软服务`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300
custom_proxy_group=📢 谷歌FCM`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300

; 5. 特殊处理的分组（保持手动或特定逻辑）
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`url-test`[]🚀 节点选择`.*1.*`http://www.gstatic.com/generate_204`300

enable_rule_generator=true
overwrite_original_rules=true
