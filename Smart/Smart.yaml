proxy-providers:
  # 节点订阅提供者定义
  Airport1:
    url: "https://"  # 订阅链接
    type: http
    interval: 86400  # 每24小时更新一次
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204  # 用于健康检查的 URL
      interval: 300  # 健康检查间隔5分钟
    proxy: "⭐ 订阅节点"  # <-- 这里强制订阅请求走指定节点
    #override:
      #additional-prefix: "前缀 |"
      #additional-suffix: "| 后缀"

proxies:
  # 内建两个基础代理
  - {name: 直连, type: direct}  # 直连不经过代理
  - {name: 拒绝, type: reject}  # 拒绝连接

# 主要监听端口设置
port: 7890  # HTTP代理端口
socks-port: 7891  # SOCKS代理端口
redir-port: 7892  # REDIR模式端口
mixed-port: 7893  # 混合端口（HTTP+SOCKS）
tproxy-port: 7895  # TProxy透明代理端口

# 全局基础配置
allow-lan: true  # 是否允许局域网设备连接
mode: rule  # 模式：rule（规则）
log-level: info  # 日志级别
bind-address: "*"  # 绑定所有IP地址
ipv6: false  # 是否启用IPv6
unified-delay: true  # 延迟统一计算
tcp-concurrent: true  # 启用TCP并发连接
find-process-mode: 'off'  # 不进行进程识别
global-client-fingerprint: chrome  # 设置客户端指纹为chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false

# 外部控制面板配置
external-controller: 0.0.0.0:9090  # 控制端口
external-ui: ui  # UI目录名
external-ui-name: zashboard
external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip  # UI下载地址
secret: '1145141919'  # 授权密码
authentication:
  - nikki:1145141919  # 用户名密码认证

# DNS 设置
dns:
  enable: true
  listen: 0.0.0.0:7874  # DNS服务监听地址
  ipv6: false
#  respect-rules: true
  enhanced-mode: fake-ip  # 启用 Fake-IP 模式
  fake-ip-range: 198.20.0.1/16  # Fake IP 网段
  fake-ip-filter-mode: blacklist  # 黑名单方式
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
  nameserver:
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query

# 嗅探器配置
sniffer:
  enable: true  # 根据流量自动识别域名
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]  # 针对 HTTP 协议进行嗅探的端口范围
      override-destination: true  # 启用后会替换目标地址为嗅探到的地址
    TLS:
      ports: [443, 8443]  # TLS 嗅探端口
    QUIC:
      ports: [443, 8443]  # QUIC 嗅探端口
  force-domain:
    - "+.v2ex.com"  # 对该域名强制进行嗅探（即便其在 skip 列表中）
  skip-domain:
    - "+.baidu.com"  # 对该域名跳过嗅探处理

# TUN 模块
tun:
  enable: true  # 启用 TUN 模式（适用于系统全局透明代理）
  stack: gvisor  # 混合栈，兼容 macOS 和 Linux
  device: utun  # 虚拟网卡设备名（在 macOS 上为 utun，Linux 可为 tun）
  endpoint-independent-nat: true  # 启用 NAT 独立端点
  auto-route: false  # 自动添加路由规则
  auto-detect-interface: false  # 自动识别出口网卡
  auto-redirect: false  # 自动启用透明代理转发
  strict-route: false  # 开启严格路由策略，阻止数据包泄漏

profile:
  store-selected: true  # 记住上次选中的策略节点
  store-fake-ip: true  # 记住上次 fake-ip 映射记录，减少重启后 DNS 异常

# 策略组定义
default: &default
  type: select  # 策略类型为 select，手动或自动在多个代理中选择
  proxies:
    - 直连  # 直接连接（不经过代理）
    - 拒绝  # 拒绝连接
    - 🔯 香港故转  # 故障切换组，通常为备用香港节点
    - 🔯 日本故转
    - 🔯 狮城故转
    - 🔯 台湾故转
    - 🔯 韩国故转
    - 🔯 美国故转
    - ♻️ 香港ECO均衡  # 均衡负载策略组（ECO 意指经济模式）
    - ♻️ 香港ECO智能  # 智能测速选择最快香港 ECO 节点
    - ♻️ 香港普通智能  # 普通测速选择最快香港节点
    - ♻️ 全球游戏智能  # 针对游戏优化的香港节点选择
    - ♻️ 日本普通智能
    - ♻️ 狮城普通智能
    - ♻️ 台湾普通智能
    - ♻️ 韩国普通智能
    - ♻️ 美国普通智能


proxy-groups:
  # 业务分流组
  - {name: 🚀 默认代理, <<: *default}  # 默认所有未匹配规则的流量走该组策略
  - {name: 📹 视频解锁, type: select, proxies: [直连, 拒绝, 🚀 默认代理, 🔯 视频故转]}  # 视频类服务的解锁策略（如 Netflix、Disney+）
  - {name: 📹 YouTube, <<: *default, proxies+: [🚀 默认代理]}  # 专为 YouTube 流量提供的代理策略选择组
  - {name: 🤖 ChatGPT, <<: *default, proxies+: [🚀 默认代理]}  # OpenAI 等 AI 服务流量的代理策略
  - {name: 📲 Telegram, <<: *default, proxies+: [🚀 默认代理]}  # Telegram 即时通讯流量
  - {name: 🐬 OneDrive, <<: *default, proxies+: [🚀 默认代理]}  # 微软 OneDrive 云服务流量
  - {name: 🪟 Microsoft, <<: *default, proxies+: [🚀 默认代理]}  # Microsoft 相关服务（如更新、激活等）
  - {name: 🌍 国外媒体, <<: *default, proxies+: [🚀 默认代理]}  # 国外主流媒体服务，如 YouTube、Netflix
  - {name: 🌏 国内媒体, <<: *default, proxies+: [🚀 默认代理]}  # 国内主流媒体服务，如爱奇艺、腾讯视频
  - {name: 🎮 游戏平台, <<: *default, proxies+: [🚀 默认代理]}  # Steam、Origin、PSN 等游戏平台
  - {name: 🌈 自定义HK, <<: *default, proxies+: [🚀 默认代理]} # 自定义使用香港节点的规则流量
  - {name: 🌈 自定义JP, <<: *default, proxies+: [🚀 默认代理]}  # 自定义使用日本节点的规则流量
  - {name: 💾 全赞助站, <<: *default, proxies+: [🚀 默认代理]}  # 赞助下载站点（BT/PT等）
  - {name: 🚾 新浪微博, <<: *default, proxies+: [🚀 默认代理]}  # 特别针对微博等特定站点的分流策略
  - {name: 📺 哔哩哔哩, <<: *default, proxies+: [🚀 默认代理]}  # 哔哩哔哩视频流量策略组
  - {name: 🐟 漏网之鱼, <<: *default, proxies+: [🚀 默认代理]}  # 所有未被规则命中的“漏网”流量
  - {name: 🎯 直连, type: select, proxies: [直连, 拒绝, 🚀 默认代理]}  # 强制直连或转代理的选择
  - {name: 🛑 广告拦截, type: select, proxies: [直连, 拒绝, 🚀 默认代理]}  # 广告流量处理策略组
  - {name: 🍃 应用净化, type: select, proxies: [直连, 拒绝, 🚀 默认代理]}  # 用于屏蔽追踪器、分析服务等背景应用通信

# 所有组（用于节点筛选与策略分流）
  # 地区选择策略组（可用于手动选择节点）
  - {name: ⭐ 订阅节点, type: select, include-all: true, filter: "(?i)订阅"}  # 包含“订阅”等关键词的节点

  # 各地区节点的故障转移组，优先使用延迟最低可用节点
  - {name: 🔯 香港故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0|0.8倍|2倍)).*(港|hk|hongkong|hong kong)"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0|2倍)).*(日本|jp|japan)"}
  - {name: 🔯 狮城故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0|2倍)).*(新加坡|狮城|SG|Singapore)"}
  - {name: 🔯 台湾故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0|2倍)).*(台|TW|Taiwan)"}
  - {name: 🔯 韩国故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0)).*(韩|KR|Korea|首尔)"}
  - {name: 🔯 美国故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|V0|2倍)).*(美|us|unitedstates|united states)"}

  # 视频平台专用容灾（奈飞、DMM等）
  - {name: 🔯 视频故转, type: fallback, include-all: true, tolerance: 20, interval: 300, filter: "(?i)^(?!.*(境外|基础|高级|V0)).*(NF|奈飞|解锁|Netflix|Media|DMM|流媒体)"}


  # 香港均衡（普通 round-robin 轮询负载均衡，排除部分关键词）
  - {name: ♻️ 香港ECO均衡, type: load-balance, include-all: true, strategy: round-robin,
     filter: "(?=.*(香港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|境外|基础|1倍|2倍|V0)).)*$"}

  # 香港智能（基于lightgbm模型评估质量，自动选择稳定节点）
  - {name: ♻️ 香港ECO智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(香港|HK|(?i)Hong))^((?!(境外|台|日|韩|新|深|美|基础|1倍|2倍|V0)).)*$"}

  - {name: ♻️ 香港普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(香港|HK|(?i)Hong))^((?!(境外|台|日|韩|新|深|美|基础|0.8倍|2倍|V0)).)*$"}

  - {name: ♻️ 全球游戏智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(游戏|(?i)GAME))^((?!(境外)).)*$"}

  # 日本、新加坡、美国普通智能组（同样基于 lightgbm 策略自动选择最优节点）
  - {name: ♻️ 日本普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(日本|JP|(?i)Japan))^((?!(境外|港|台|韩|新|美|基础|V0)).)*$"}

  - {name: ♻️ 狮城普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))^((?!(境外|港|台|韩|日|美|基础|V0)).)*$"}

  - {name: ♻️ 台湾普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(台|TW|Taiwan))^((?!(境外|港|新|韩|日|美|基础|V0)).)*$"}

  - {name: ♻️ 韩国普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(韩|KR|Korea|首尔))^((?!(境外|港|新|台|日|美|基础|V0)).)*$"}

  - {name: ♻️ 美国普通智能, type: smart, uselightgbm: true, collectdata: false, include-all: true,
     policy-priority: "高级:0.9;RPO:1.3", strategy: sticky-sessions, interval: 300,
     filter: "(?=.*(美|加|US|(?i)States|America))^((?!(境外|港|台|日|韩|新|基础|V0)).)*$"}



